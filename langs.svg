<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 195" width="480" height="195">
<defs>
  <clipPath id="langsRounded"><rect width="480" height="195" rx="18"/></clipPath>
  <radialGradient id="bgGlow2" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="#3a1a5c"/>
    <stop offset="100%" stop-color="#150a24"/>
  </radialGradient>
</defs>
<g clip-path="url(#langsRounded)">
  <rect width="480" height="195" fill="url(#bgGlow2)"/>
  <rect x="0.5" y="0.5" width="479" height="194" rx="17.5" fill="none" stroke="#ff8ad0" stroke-width="1"/>
  <text x="24" y="30" font-family="'Segoe UI',Arial,sans-serif" font-size="16" font-weight="700" fill="#f3e8ff">Most Used Languages</text>
  <g transform="translate(40,58)">
    <g transform="translate(0,0)">
      <text x="0" y="-6" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#f3e8ff">JavaScript</text>
      <text x="400" y="-6" text-anchor="end" font-family="'JetBrains Mono',monospace" font-size="12" fill="#c9a8e9">34.2%</text>
      <rect x="0" y="0" width="400" height="9" rx="4.5" fill="#ffffff12"/>
      <rect x="0" y="0" width="0" height="9" rx="4.5" fill="#f1e05a">
        <animate attributeName="width" from="0" to="136.8" begin="0.50s" dur="1.0s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
        <animate attributeName="opacity" values="0.85;1;0.85" dur="2.6s" begin="1.50s" repeatCount="indefinite"/>
      </rect>
    </g>
<g transform="translate(0,30)">
      <text x="0" y="-6" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#f3e8ff">HTML</text>
      <text x="400" y="-6" text-anchor="end" font-family="'JetBrains Mono',monospace" font-size="12" fill="#c9a8e9">22.8%</text>
      <rect x="0" y="0" width="400" height="9" rx="4.5" fill="#ffffff12"/>
      <rect x="0" y="0" width="0" height="9" rx="4.5" fill="#e34c26">
        <animate attributeName="width" from="0" to="91.2" begin="0.70s" dur="1.0s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
        <animate attributeName="opacity" values="0.85;1;0.85" dur="2.6s" begin="1.70s" repeatCount="indefinite"/>
      </rect>
    </g>
<g transform="translate(0,60)">
      <text x="0" y="-6" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#f3e8ff">Java</text>
      <text x="400" y="-6" text-anchor="end" font-family="'JetBrains Mono',monospace" font-size="12" fill="#c9a8e9">19.5%</text>
      <rect x="0" y="0" width="400" height="9" rx="4.5" fill="#ffffff12"/>
      <rect x="0" y="0" width="0" height="9" rx="4.5" fill="#b07219">
        <animate attributeName="width" from="0" to="78.0" begin="0.90s" dur="1.0s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
        <animate attributeName="opacity" values="0.85;1;0.85" dur="2.6s" begin="1.90s" repeatCount="indefinite"/>
      </rect>
    </g>
<g transform="translate(0,90)">
      <text x="0" y="-6" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#f3e8ff">CSS</text>
      <text x="400" y="-6" text-anchor="end" font-family="'JetBrains Mono',monospace" font-size="12" fill="#c9a8e9">14.0%</text>
      <rect x="0" y="0" width="400" height="9" rx="4.5" fill="#ffffff12"/>
      <rect x="0" y="0" width="0" height="9" rx="4.5" fill="#563d7c">
        <animate attributeName="width" from="0" to="56.0" begin="1.10s" dur="1.0s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
        <animate attributeName="opacity" values="0.85;1;0.85" dur="2.6s" begin="2.10s" repeatCount="indefinite"/>
      </rect>
    </g>
<g transform="translate(0,120)">
      <text x="0" y="-6" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#f3e8ff">Others</text>
      <text x="400" y="-6" text-anchor="end" font-family="'JetBrains Mono',monospace" font-size="12" fill="#c9a8e9">9.5%</text>
      <rect x="0" y="0" width="400" height="9" rx="4.5" fill="#ffffff12"/>
      <rect x="0" y="0" width="0" height="9" rx="4.5" fill="#a98fd6">
        <animate attributeName="width" from="0" to="38.0" begin="1.30s" dur="1.0s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
        <animate attributeName="opacity" values="0.85;1;0.85" dur="2.6s" begin="2.30s" repeatCount="indefinite"/>
      </rect>
    </g>
